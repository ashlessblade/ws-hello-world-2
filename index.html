<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Executive Ascent</title>
  <meta name="description" content="Build daily habits. Rise through the ranks. Become CEO." />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Exec Ascent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; background: #030712; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    input, select, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    .s-through { text-decoration: line-through; }
    .fade { transition: opacity 0.2s; }
    @keyframes pop { 0%{transform:scale(0.8);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
    .pop { animation: pop 0.3s ease; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const RANKS = [
  { level:1, title:"Business Developer", xpRequired:0, badge:"🌱" },
  { level:2, title:"Account Manager", xpRequired:6000, badge:"📋" },
  { level:3, title:"Team Lead", xpRequired:12000, badge:"👥" },
  { level:4, title:"Sales Director", xpRequired:18000, badge:"📈" },
  { level:5, title:"VP of Growth", xpRequired:22000, badge:"🚀" },
  { level:6, title:"Chief of Staff", xpRequired:25000, badge:"🏛️" },
  { level:7, title:"COO", xpRequired:28000, badge:"⚙️" },
  { level:8, title:"CFO", xpRequired:32000, badge:"💰" },
  { level:9, title:"CEO", xpRequired:37000, badge:"👑" },
];

const DEFAULT_HABITS = [
  { id:1, name:"Deep Work (2h+ focused)", xp:40, category:"Execution", icon:"🧠" },
  { id:2, name:"Morning Planning", xp:20, category:"Strategy", icon:"📅" },
  { id:3, name:"Network / Relationship", xp:30, category:"Leadership", icon:"🤝" },
  { id:4, name:"Read / Learn (30min+)", xp:25, category:"Strategy", icon:"📚" },
  { id:5, name:"Exercise / Wellness", xp:25, category:"Wellness", icon:"💪" },
  { id:6, name:"Review KPIs / Goals", xp:20, category:"Strategy", icon:"🎯" },
  { id:7, name:"Team Check-in / Mentor", xp:30, category:"Leadership", icon:"💬" },
  { id:8, name:"Evening Reflection", xp:15, category:"Sleep", icon:"🌙" },
];

const STAT_BG = {
  Execution:"#1e3a5f", Strategy:"#2e1a5f", Leadership:"#5f3a1a", Wellness:"#1a5f2e"
};
const STAT_BORDER = {
  Execution:"#3b82f6", Strategy:"#a855f7", Leadership:"#f59e0b", Wellness:"#22c55e"
};

const todayKey = () => new Date().toISOString().split("T")[0];
const getRank = xp => { let r = RANKS[0]; for (const rank of RANKS) { if (xp >= rank.xpRequired) r = rank; } return r; };
const getNextRank = xp => RANKS.find(r => r.xpRequired > xp) || null;

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function App() {
  const [tab, setTab] = useState("today");
  const [profile, setProfile] = useState(() => load("ea_profile", null));
  const [habits, setHabits] = useState(() => load("ea_habits", DEFAULT_HABITS));
  const [history, setHistory] = useState(() => load("ea_history", {}));
  const [stats, setStats] = useState(() => load("ea_stats", { Execution:0, Strategy:0, Leadership:0, Wellness:0 }));
  const [totalXp, setTotalXp] = useState(() => load("ea_xp", 0));
  const [streak, setStreak] = useState(() => load("ea_streak", 0));
  const [checked, setChecked] = useState(() => { const h = load("ea_history", {}); return h[todayKey()] || {}; });
  const [newHabit, setNewHabit] = useState({ name:"", category:"Execution", xp:20, icon:"⭐" });
  const [showAdd, setShowAdd] = useState(false);
  const [levelUpMsg, setLevelUpMsg] = useState(null);
  const [nameInput, setNameInput] = useState("");

  function createProfile() {
    if (!nameInput.trim()) return;
    const p = { name: nameInput.trim() };
    setProfile(p); save("ea_profile", p);
  }

  function toggleHabit(habit) {
    const today = todayKey();
    const prev = checked[habit.id] || false;
    const newChecked = { ...checked, [habit.id]: !prev };
    setChecked(newChecked);
    const newHistory = { ...history, [today]: newChecked };
    setHistory(newHistory); save("ea_history", newHistory);

    const delta = prev ? -habit.xp : habit.xp;
    const newXp = Math.max(0, totalXp + delta);
    const prevRank = getRank(totalXp);
    const newRank = getRank(newXp);
    if (newRank.level > prevRank.level) setLevelUpMsg(newRank);
    setTotalXp(newXp); save("ea_xp", newXp);

    const newStats = { ...stats, [habit.category]: Math.max(0, stats[habit.category] + delta) };
    setStats(newStats); save("ea_stats", newStats);

    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    const yKey = yesterday.toISOString().split("T")[0];
    const hadYesterday = history[yKey] && Object.values(history[yKey]).some(Boolean);
    const hasToday = Object.values(newChecked).some(Boolean);
    const s = hasToday ? (hadYesterday ? streak : Math.max(streak, 1)) : streak;
    setStreak(s); save("ea_streak", s);
  }

  function addHabit() {
    if (!newHabit.name.trim()) return;
    const h = { ...newHabit, id: Date.now() };
    const updated = [...habits, h];
    setHabits(updated); save("ea_habits", updated);
    setNewHabit({ name:"", category:"Execution", xp:20, icon:"⭐" });
    setShowAdd(false);
  }

  function removeHabit(id) {
    const updated = habits.filter(h => h.id !== id);
    setHabits(updated); save("ea_habits", updated);
  }

  if (!profile) return (
    <div style={{minHeight:"100vh",background:"#030712",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
      <div style={{background:"#111827",border:"1px solid #374151",borderRadius:"16px",padding:"32px",width:"100%",maxWidth:"360px",textAlign:"center"}}>
        <div style={{fontSize:"48px",marginBottom:"12px"}}>🌱</div>
        <h1 style={{fontSize:"22px",fontWeight:"800",marginBottom:"8px"}}>Executive Ascent</h1>
        <p style={{color:"#9ca3af",fontSize:"14px",marginBottom:"24px"}}>Build daily habits. Rise through the ranks. Become CEO.</p>
        <input
          style={{width:"100%",background:"#1f2937",border:"1px solid #4b5563",borderRadius:"10px",padding:"10px 14px",color:"white",fontSize:"15px",marginBottom:"12px",outline:"none"}}
          placeholder="Enter your name..."
          value={nameInput}
          onChange={e => setNameInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && createProfile()}
        />
        <button onClick={createProfile}
          style={{width:"100%",background:"#d97706",border:"none",borderRadius:"10px",padding:"10px",color:"white",fontWeight:"700",fontSize:"15px",cursor:"pointer"}}>
          Begin My Ascent →
        </button>
      </div>
    </div>
  );

  const rank = getRank(totalXp);
  const nextRank = getNextRank(totalXp);
  const progress = nextRank ? Math.min(100, ((totalXp - rank.xpRequired) / (nextRank.xpRequired - rank.xpRequired)) * 100) : 100;
  const todayXp = habits.filter(h => checked[h.id]).reduce((s, h) => s + h.xp, 0);
  const completedToday = habits.filter(h => checked[h.id]).length;
  const weekDays = Array.from({length:7}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate() - (6-i));
    const key = d.toISOString().split("T")[0];
    return { key, label: d.toLocaleDateString("en",{weekday:"short"}), done: history[key] ? Object.values(history[key]).filter(Boolean).length : 0 };
  });

  const s = { card:{background:"#111827",border:"1px solid #374151",borderRadius:"16px",padding:"16px",marginBottom:"12px"} };

  return (
    <div style={{maxWidth:"440px",margin:"0 auto",padding:"12px 12px 96px",minHeight:"100vh",background:"#030712"}}>

      {levelUpMsg && (
        <div onClick={() => setLevelUpMsg(null)}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:"16px"}}>
          <div className="pop" style={{background:"#111827",border:"2px solid #f59e0b",borderRadius:"20px",padding:"40px",textAlign:"center"}}>
            <div style={{fontSize:"64px",marginBottom:"12px"}}>{levelUpMsg.badge}</div>
            <div style={{color:"#f59e0b",fontSize:"20px",fontWeight:"800",marginBottom:"4px"}}>PROMOTION!</div>
            <div style={{fontSize:"24px",fontWeight:"800"}}>{levelUpMsg.title}</div>
            <div style={{color:"#6b7280",fontSize:"13px",marginTop:"8px"}}>Tap to continue</div>
          </div>
        </div>
      )}

      {/* Profile Card */}
      <div style={s.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>
          <div>
            <div style={{color:"#6b7280",fontSize:"11px",textTransform:"uppercase",letterSpacing:"2px"}}>Executive</div>
            <div style={{fontWeight:"800",fontSize:"18px"}}>{profile.name}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"32px"}}>{rank.badge}</div>
            <div style={{color:"#f59e0b",fontSize:"11px",fontWeight:"700"}}>{rank.title}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:"8px",marginBottom:"4px",fontSize:"12px",color:"#6b7280"}}>
          <span>XP {totalXp.toLocaleString()}</span>
          {nextRank && <span>→ {nextRank.xpRequired.toLocaleString()} for {nextRank.title}</span>}
        </div>
        <div style={{background:"#374151",borderRadius:"99px",height:"8px",marginBottom:"16px"}}>
          <div style={{background:"#d97706",height:"8px",borderRadius:"99px",width:`${progress}%`,transition:"width 0.5s"}} />
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px",marginBottom:"12px"}}>
          {Object.entries(stats).map(([k,v]) => (
            <div key={k} style={{background:STAT_BG[k],border:`1px solid ${STAT_BORDER[k]}`,borderRadius:"10px",padding:"8px",textAlign:"center"}}>
              <div style={{fontWeight:"800",fontSize:"15px"}}>{Math.round(v/10)}</div>
              <div style={{color:"#9ca3af",fontSize:"10px"}}>{k}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:"8px"}}>
          {[["+" + todayXp + " XP","Today","#f59e0b"],["🔥 " + streak,"Streak","#f97316"],[completedToday+"/"+habits.length,"Done","#22c55e"]].map(([val,label,color]) => (
            <div key={label} style={{flex:1,background:"#1f2937",borderRadius:"10px",padding:"8px",textAlign:"center"}}>
              <div style={{color,fontWeight:"700",fontSize:"14px"}}>{val}</div>
              <div style={{color:"#6b7280",fontSize:"11px"}}>{label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",background:"#111827",border:"1px solid #374151",borderRadius:"12px",padding:"4px",marginBottom:"12px",gap:"4px"}}>
        {["today","progress","ranks"].map(t => (
          <button key={t} onClick={() => setTab(t)}
            style={{flex:1,padding:"8px",borderRadius:"9px",border:"none",fontWeight:"700",fontSize:"13px",cursor:"pointer",textTransform:"capitalize",
              background: tab===t ? "#d97706" : "transparent",
              color: tab===t ? "white" : "#9ca3af"}}>
            {t === "today" ? "Today" : t === "progress" ? "Progress" : "Ranks"}
          </button>
        ))}
      </div>

      {/* TODAY */}
      {tab === "today" && (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
            <div style={{color:"#6b7280",fontSize:"11px",textTransform:"uppercase",letterSpacing:"2px"}}>Daily Habits</div>
            <button onClick={() => setShowAdd(!showAdd)}
              style={{background:"#92400e",border:"none",borderRadius:"8px",padding:"4px 12px",color:"white",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>
              + Add
            </button>
          </div>
          {showAdd && (
            <div style={{...s.card,marginBottom:"8px"}}>
              <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
                <input style={{flex:1,background:"#1f2937",border:"1px solid #4b5563",borderRadius:"8px",padding:"8px 12px",color:"white",fontSize:"13px",outline:"none"}}
                  placeholder="Habit name..." value={newHabit.name} onChange={e => setNewHabit({...newHabit, name:e.target.value})} />
                <input style={{width:"44px",background:"#1f2937",border:"1px solid #4b5563",borderRadius:"8px",padding:"8px",color:"white",fontSize:"13px",outline:"none",textAlign:"center"}}
                  value={newHabit.icon} onChange={e => setNewHabit({...newHabit, icon:e.target.value})} />
              </div>
              <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
                <select style={{flex:1,background:"#1f2937",border:"1px solid #4b5563",borderRadius:"8px",padding:"8px",color:"white",fontSize:"13px",outline:"none"}}
                  value={newHabit.category} onChange={e => setNewHabit({...newHabit, category:e.target.value})}>
                  {["Execution","Strategy","Leadership","Wellness"].map(c => <option key={c}>{c}</option>)}
                </select>
                <input type="number" style={{width:"64px",background:"#1f2937",border:"1px solid #4b5563",borderRadius:"8px",padding:"8px",color:"white",fontSize:"13px",outline:"none",textAlign:"center"}}
                  value={newHabit.xp} min={5} max={100} onChange={e => setNewHabit({...newHabit, xp:Number(e.target.value)})} />
                <span style={{color:"#6b7280",fontSize:"12px",alignSelf:"center"}}>XP</span>
              </div>
              <button onClick={addHabit}
                style={{width:"100%",background:"#d97706",border:"none",borderRadius:"8px",padding:"8px",color:"white",fontWeight:"700",fontSize:"13px",cursor:"pointer"}}>
                Add Habit
              </button>
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {habits.map(h => (
              <div key={h.id} onClick={() => toggleHabit(h)}
                style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px",borderRadius:"12px",cursor:"pointer",
                  background: checked[h.id] ? "#1f2937" : "#111827",
                  border: `1px solid ${checked[h.id] ? "#d97706" : "#374151"}`,
                  opacity: checked[h.id] ? 0.75 : 1, transition:"all 0.2s"}}>
                <div style={{width:"24px",height:"24px",borderRadius:"50%",border:`2px solid ${checked[h.id] ? "#d97706" : "#6b7280"}`,
                  background: checked[h.id] ? "#d97706" : "transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {checked[h.id] && <span style={{color:"white",fontSize:"12px",fontWeight:"900"}}>✓</span>}
                </div>
                <div style={{fontSize:"20px"}}>{h.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"13px",fontWeight:"600",color: checked[h.id] ? "#6b7280" : "white",textDecoration: checked[h.id] ? "line-through" : "none"}}>{h.name}</div>
                  <div style={{fontSize:"11px",color:"#6b7280"}}>{h.category}</div>
                </div>
                <div style={{color:"#f59e0b",fontSize:"12px",fontWeight:"700"}}>+{h.xp} XP</div>
                <button onClick={e => { e.stopPropagation(); removeHabit(h.id); }}
                  style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:"14px",padding:"0 4px"}} title="Remove">✕</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* PROGRESS */}
      {tab === "progress" && (
        <div>
          <div style={{color:"#6b7280",fontSize:"11px",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"8px"}}>This Week</div>
          <div style={{...s.card,display:"flex",justifyContent:"space-between"}}>
            {weekDays.map(d => (
              <div key={d.key} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"}}>
                <div style={{color:"#6b7280",fontSize:"11px"}}>{d.label}</div>
                <div style={{width:"36px",height:"36px",borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:"700",
                  background: d.done > 0 ? "#d97706" : "#1f2937", color: d.done > 0 ? "white" : "#6b7280"}}>
                  {d.done > 0 ? d.done : "–"}
                </div>
              </div>
            ))}
          </div>
          <div style={{color:"#6b7280",fontSize:"11px",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"8px"}}>Stats</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"8px"}}>
            {Object.entries(stats).map(([k,v]) => (
              <div key={k} style={{background:STAT_BG[k],border:`1px solid ${STAT_BORDER[k]}`,borderRadius:"12px",padding:"12px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
                  <div style={{fontSize:"13px",fontWeight:"700"}}>{k}</div>
                  <div style={{fontWeight:"800"}}>{Math.round(v/10)}</div>
                </div>
                <div style={{background:"#1f2937",borderRadius:"99px",height:"6px"}}>
                  <div style={{background:STAT_BORDER[k],height:"6px",borderRadius:"99px",width:`${Math.min(100,(v/500)*100+5)}%`,transition:"width 0.5s"}} />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* RANKS */}
      {tab === "ranks" && (
        <div>
          <div style={{color:"#6b7280",fontSize:"11px",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"8px"}}>Career Ladder</div>
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {RANKS.map(r => {
              const unlocked = totalXp >= r.xpRequired;
              const isCurrent = r.level === rank.level;
              return (
                <div key={r.level} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px",borderRadius:"12px",
                  background: isCurrent ? "#292000" : unlocked ? "#111827" : "#0a0a0f",
                  border: `1px solid ${isCurrent ? "#d97706" : unlocked ? "#374151" : "#1f2937"}`,
                  opacity: !unlocked ? 0.5 : 1}}>
                  <div style={{fontSize:"28px"}}>{r.badge}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:"700",fontSize:"14px",color: isCurrent ? "#f59e0b" : unlocked ? "white" : "#6b7280"}}>{r.title}</div>
                    <div style={{fontSize:"11px",color:"#6b7280"}}>{r.xpRequired.toLocaleString()} XP required</div>
                  </div>
                  {isCurrent && <div style={{background:"#d97706",borderRadius:"99px",padding:"2px 10px",fontSize:"11px",fontWeight:"700"}}>YOU</div>}
                  {unlocked && !isCurrent && <div style={{color:"#22c55e",fontSize:"14px"}}>✓</div>}
                  {!unlocked && <div style={{fontSize:"14px"}}>🔒</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(r => console.log('SW registered'))
      .catch(e => console.log('SW error', e));
  });
}
</script>
</body>
</html>
